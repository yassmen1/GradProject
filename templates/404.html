<!DOCTYPE html>
<html>
<head>
    <title>404</title>

    <style>
        body{
            font-family:'Segoe UI';
            background:linear-gradient(135deg,#e0e7ff,#fce7f3);

            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            margin:0;
        }

        .box{
            background:white;
            padding:40px;
            border-radius:20px;
            text-align:center;
            box-shadow:0 10px 30px rgba(0,0,0,0.08);
        }

        a{
            display:inline-block;
            margin-top:20px;
            padding:12px 20px;
            background:#6366f1;
            color:white;
            text-decoration:none;
            border-radius:12px;
        }
    </style>
</head>

<body>

<div class="box">

    <h1>404</h1>

    <p>Page Not Found</p>

    <a href="/">Back Home</a>

</div>

</body>
</html>
