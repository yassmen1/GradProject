<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 200px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .value {
            font-size: 28px;
            margin-top: 10px;
            color: #333;
        }

        .title {
            font-size: 18px;
            color: #777;
        }

        .alerts {
            margin-top: 30px;
            color: red;
            font-weight: bold;
        }

        .state {
            margin-top: 20px;
            font-size: 22px;
            color: green;
        }
    </style>
</head>
<body>

    <h1>📊 Live Sensor Dashboard</h1>

    <div class="container">

        <div class="card">
            <div class="title">Heart Rate</div>
            <div id="hr" class="value">0</div>
        </div>

        <div class="card">
            <div class="title">Acceleration</div>
            <div id="acc" class="value">0</div>
        </div>

        <div class="card">
            <div class="title">Microphone</div>
            <div id="mic" class="value">0</div>
        </div>

        <div class="card">
            <div class="title">Frequency</div>
            <div id="freq" class="value">0</div>
        </div>

    </div>

    <div class="state">
        State: <span id="state">Normal</span>
    </div>

    <div class="alerts" id="alerts">
    </div>

    <script>
        function updateData() {
            fetch("/get_data")
                .then(response => response.json())
                .then(data => {

                    document.getElementById("hr").innerText = data.hr;
                    document.getElementById("acc").innerText = data.acc;
                    document.getElementById("mic").innerText = data.mic;
                    document.getElementById("freq").innerText = data.freq;

                    document.getElementById("state").innerText = data.state;

                    let alertsDiv = document.getElementById("alerts");
                    alertsDiv.innerHTML = "";

                    if (data.alerts && data.alerts.length > 0) {
                        data.alerts.forEach(a => {
                            alertsDiv.innerHTML += "<div>" + a + "</div>";
                        });
                    }
                })
                .catch(err => console.log("Error:", err));
        }

        setInterval(updateData, 1000);
    </script>

</body>
</html>
