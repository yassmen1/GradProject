<!DOCTYPE html>
<html>
<head>
    <title>Screening</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma;
            background: linear-gradient(135deg, #e3f2fd, #fce4ec);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            width: 500px;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }

        h2 {
            margin-bottom: 10px;
            color: #333;
        }

        .progress {
            height: 8px;
            background: #eee;
            border-radius: 10px;
            margin: 20px 0;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: #1976d2;
            width: {{ ((q_index + 1) / total * 100) }}%;
            transition: 0.3s;
        }

        .question {
            font-size: 20px;
            margin: 20px 0;
            color: #444;
        }

        select {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border-radius: 10px;
            border: 1px solid #ccc;
            outline: none;
        }

        select:focus {
            border-color: #1976d2;
        }

        .buttons {
            margin-top: 25px;
            display: flex;
            justify-content: space-between;
        }

        button {
            padding: 12px 25px;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        .prev {
            background: #9e9e9e;
            color: white;
        }

        .prev:hover {
            background: #757575;
        }

        .next {
            background: #1976d2;
            color: white;
        }

        .next:hover {
            background: #0d47a1;
        }

        .error {
            color: red;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

    <div class="card">

        <h2>Question {{ q_index + 1 }} of {{ total }}</h2>

        <!-- Progress Bar -->
        <div class="progress">
            <div class="progress-bar"></div>
        </div>

        <p class="question">{{ question }}</p>

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

        <form method="post">

            <select name="answer">
                <option value="" disabled {% if selected is none %}selected{% endif %}>
                    Select answer
                </option>

                <option value="1" {% if selected == 1 %}selected{% endif %}>Always</option>
                <option value="2" {% if selected == 2 %}selected{% endif %}>Sometimes</option>
                <option value="3" {% if selected == 3 %}selected{% endif %}>Rarely</option>
                <option value="4" {% if selected == 4 %}selected{% endif %}>Never</option>
            </select>

            <div class="buttons">

                {% if q_index > 0 %}
                    <button type="submit" name="prev" class="prev">Previous</button>
                {% else %}
                    <div></div>
                {% endif %}

                <button type="submit" name="next" class="next">
                    {% if q_index == total - 1 %}
                        Finish
                    {% else %}
                        Next
                    {% endif %}
                </button>

            </div>

        </form>

    </div>

</body>
</html>
