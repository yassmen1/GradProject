<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body {
    font-family: 'Segoe UI';
    background: linear-gradient(135deg,#e3f2fd,#fce4ec);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card {
    background:white;
    padding:40px;
    border-radius:20px;
    width:350px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h2 {
    margin-bottom:20px;
}

input {
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:10px;
    border:1px solid #ccc;
}

button {
    width:100%;
    padding:12px;
    background:#1976d2;
    color:white;
    border:none;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
}

button:hover {
    background:#0d47a1;
}

a {
    display:block;
    margin-top:15px;
    color:#1976d2;
    text-decoration:none;
}
</style>

</head>

<body>

<div class="card">
    <h2>Login 👋</h2>

    <form method="post">
        <input name="username" placeholder="Username" required>
        <input name="password" type="password" placeholder="Password" required>

        <button>Login</button>
    </form>

    <a href="/register">Create account</a>
</div>

</body>
</html>
