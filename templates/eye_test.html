<!DOCTYPE html>
<html>
<head>
    <title>Eye Test</title>

    <style>
        body {
            font-family: 'Segoe UI';
            background: linear-gradient(135deg, #e3f2fd, #fce4ec);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            width: 450px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        button {
            padding: 15px 25px;
            font-size: 18px;
            background: #1976d2;
            color: white;
            border: none;
            border-radius: 10px;
            margin-top: 20px;
        }

        button:hover {
            background: #0d47a1;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>Eye Contact Test 👁️</h2>

    <p>Please look directly at the camera for a few seconds.</p>

    <form method="post">
        <button>Start Test</button>
    </form>
</div>

</body>
</html>
