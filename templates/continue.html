<!DOCTYPE html>
<html>
<head>
<title>Continue</title>

<style>

body{
    font-family:'Segoe UI';
    background:linear-gradient(135deg,#e0e7ff,#fce7f3);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:0;
}

.box{
    background:white;
    padding:40px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
    width:400px;
}

h2{
    margin-bottom:10px;
}

p{
    color:#666;
    margin-bottom:25px;
}

.btn{
    display:block;
    margin-top:15px;
    padding:14px;
    border-radius:12px;
    text-decoration:none;
    color:white;
    font-weight:bold;
}

.result{
    background:#3b82f6;
}

.reassess{
    background:#8b5cf6;
}

</style>
</head>

<body>

<div class="box">

    <h2>Welcome Back 👋</h2>

    <p>
        You already have previous assessments.
    </p>

    <a href="/result" class="btn result">
        📊 Continue to Final Result
    </a>

    <a href="/parent_info" class="btn reassess">
        🔄 Start Reassessment
    </a>

</div>

</body>
</html>
