<!DOCTYPE html>
<html>
<head>
<title>Register</title>

<style>
body {
    font-family: 'Segoe UI';
    background: linear-gradient(135deg,#e3f2fd,#fce4ec);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card {
    background:white;
    padding:40px;
    border-radius:20px;
    width:350px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

input {
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:10px;
    border:1px solid #ccc;
}

button {
    width:100%;
    padding:12px;
    background:#4caf50;
    color:white;
    border:none;
    border-radius:10px;
}

button:hover {
    background:#2e7d32;
}
</style>

</head>

<body>

<div class="card">
    <h2>Create Account 📝</h2>

    <form method="post">
        <input name="username" placeholder="Username" required>
        <input name="password" type="password" placeholder="Password" required>

        <button>Register</button>
    </form>
</div>

</body>
</html>
